apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: luks-encrypted
provisioner: luks.csi.example.com
reclaimPolicy: Delete
# Immediate: our CreateVolume provisions the backing PVC synchronously.
# WaitForFirstConsumer is not yet supported for the backing StorageClass.
volumeBindingMode: Immediate
parameters:
  # StorageClass that will provision the underlying raw block volume.
  # Change this to match the block StorageClass available in your cluster.
  backingStorageClass: local-path

  # LUKS encryption parameters
  luksType: luks2
  filesystem: ext4

  # CSI secret references — Kubernetes resolves these per-PVC and passes
  # the Secret's contents to NodeStageVolume as the 'secrets' map.
  # The Secret must have a key named 'luksKey' containing the passphrase.
  #
  # Naming convention: create a Secret named <pvc-name>-luks-key in the
  # same namespace as the PVC before creating the PVC.
  csi.storage.k8s.io/node-stage-secret-name: "${pvc.name}-luks-key"
  csi.storage.k8s.io/node-stage-secret-namespace: "${pvc.namespace}"
