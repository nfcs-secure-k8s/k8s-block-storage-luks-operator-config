# AppArmor profile for the luks-csi node container.
#
# This profile is a whitelist that allows only the specific binaries,
# capabilities, and device access that the LUKS CSI node container needs.
# It is ported directly from the upstream kopf operator's k8s-luks-restricted.sh.
#
# DEPLOYMENT:
#   The profile must be loaded on every node before the DaemonSet will
#   honour the AppArmor annotation. Use the DaemonSet below to do this
#   automatically at node startup.
#
#   kubectl apply -f manifests/apparmor-profile.yaml
#
# The node DaemonSet (node.yaml) references this profile via:
#   container.apparmor.security.beta.kubernetes.io/luks-csi: localhost/k8s-luks-restricted
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: luks-apparmor-profile
  namespace: kube-system
data:
  k8s-luks-restricted: |
    include <tunables/global>

    profile k8s-luks-restricted flags=(attach_disconnected) {
      include <abstractions/base>
      include <abstractions/nameservice>

      # Allowed binaries
      /bin/sh ix,
      /bin/busybox ix,
      /sbin/apk ix,
      /{usr/,}sbin/cryptsetup ix,
      /{usr/,}bin/nsenter ix,
      /{usr/,}bin/lsblk ix,
      /{usr/,}bin/findmnt ix,
      /{usr/,}sbin/dmsetup ix,
      /{usr/,}bin/fuser ix,
      /{usr/,}bin/umount ix,
      /{usr/,}bin/mount ix,
      /{usr/,}bin/tr ix,
      /{usr/,}bin/awk ix,
      /{usr/,}bin/grep ix,
      /{usr/,}bin/sleep ix,
      /{usr/,}bin/mkdir ix,
      /{usr/,}sbin/mkfs.ext4 ix,
      /{usr/,}sbin/mke2fs ix,
      /{usr/,}bin/chown ix,
      /{usr/,}bin/chmod ix,

      # Required capabilities
      capability chown,
      capability fowner,
      capability fsetid,
      capability dac_override,
      capability dac_read_search,
      capability sys_chroot,
      capability sys_admin,
      capability sys_resource,
      capability ipc_lock,
      capability sys_ptrace,
      capability sys_nice,
      capability mknod,

      ptrace (read, trace) peer=unconfined,
      network alg,
      network unix,

      # Block devices
      /dev/vd* rwmk,
      /dev/sd* rwmk,
      /dev/dm-* rwmk,
      /dev/mapper/* rwmk,
      /dev/mapper/control rwmk,
      /dev/loop* rwmk,
      /dev/urandom r,
      /dev/random r,

      # System info
      / r,
      /etc/mke2fs.conf r,
      /etc/ssl/openssl.cnf r,
      /proc/crypto r,
      /proc/devices r,
      @{PROC}/self/mountinfo r,
      @{PROC}/[0-9]*/mountinfo r,
      /sys/dev/block/** r,
      /sys/devices/** r,
      /sys/block/** r,
      /sys/fs/ r,

      # Runtime and cryptsetup locks
      /run/ r,
      /run/mount/ rw,
      /run/mount/** rw,
      /run/cryptsetup/ rwk,
      /run/cryptsetup/** rwk,

      # Mount paths used by the CSI staging/publish flow
      /var/lib/kubelet/** rw,

      mount fstype=ext4,
      mount fstype=xfs,
      umount,

      # Hard denials
      deny /etc/shadow w,
      deny /root/** w,
      deny /sys/firmware/** rw,
    }
---
# DaemonSet that loads the AppArmor profile on every node at startup.
# Runs once per node (initContainers only) and then sleeps indefinitely
# to keep the pod Running (so kubelet can track it).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: luks-apparmor-loader
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: luks-apparmor-loader
  template:
    metadata:
      labels:
        app: luks-apparmor-loader
    spec:
      hostPID: true
      initContainers:
        - name: apparmor-loader
          image: ubuntu:22.04
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Loading k8s-luks-restricted AppArmor profile..."
              cp /profiles/k8s-luks-restricted /etc/apparmor.d/k8s-luks-restricted
              apparmor_parser -r /etc/apparmor.d/k8s-luks-restricted
              echo "Profile loaded."
          securityContext:
            privileged: true
          volumeMounts:
            - name: profile
              mountPath: /profiles
            - name: apparmor-d
              mountPath: /etc/apparmor.d
      containers:
        - name: pause
          image: gcr.io/google_containers/pause:3.1
      volumes:
        - name: profile
          configMap:
            name: luks-apparmor-profile
        - name: apparmor-d
          hostPath:
            path: /etc/apparmor.d
            type: DirectoryOrCreate
