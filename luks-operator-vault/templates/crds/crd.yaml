apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: encryptedvolumes.crypto.example.com
spec:
  group: crypto.example.com
  scope: Namespaced
  names:
    plural: encryptedvolumes
    singular: encryptedvolume
    kind: EncryptedVolume
    shortNames: ["evluks"]
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["institution", "pvcName"]
              properties:
                institution:
                  type: string
                  default: "default"
                pvcName:
                  type: string
                mountPath:
                  type: string
                  default: "/mnt/securefolder"
                size:
                  type: string
                  default: "1Gi"
                storageClassName:
                  type: string
                  default: "csi-cinder"
                deletionPolicy:
                  type: string
                  enum: ["Delete", "Retain"]
                  default: "Delete"
                luksType:
                  type: string
                  default: "luks2"
                filesystem:
                  type: string
                  default: "ext4"
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
