apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: encryptedvolumes.crypto.example.com
spec:
  group: crypto.example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - encryptionKeySecret
              properties:
                pvcName:
                  type: string
                  default: csi-pvc-cinder-for-luks

                storageClassName:
                  type: string
                  default: csi-cinder

                size:
                  type: string
                  default: 1Gi
                  pattern: "^[0-9]+(Ei|Pi|Ti|Gi|Mi|Ki)$"

                encryptionKeySecret:
                  type: string

                luksType:
                  type: string
                  default: luks2
                  enum: ["luks1", "luks2"]

                filesystem:
                  type: string
                  default: ext4
                  enum: ["ext4", "xfs"]

                mountPath:
                  type: string
                  default: /mnt/securefolder
  scope: Namespaced
  names:
    plural: encryptedvolumes
    singular: encryptedvolume
    kind: EncryptedVolume
    shortNames:
      - evluks
